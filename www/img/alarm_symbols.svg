<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="500px" height="500px" viewBox="0 0 1000 1000">
	<defs>
		<symbol id="pressure" x="0" y="0" width="20px" height="20px" style="overflow:visible">
			<path style="fill:#ffffff;fill-opacity:0.4;stroke:none;" d="M -9,9 9,9 0,-9 z"/>
			<path d="M -9,9 9,9 0,-9 z"/>
			<path style="fill:none;stroke:#000000;stroke-width:1px;stroke-linejoin:round;stroke-linecap:round;" d="M -5,7 L 5,7 C5,-2 -5,-2 -5,7 M-3,5 C-2,1 2,1 3,5 M0,5 L1,3"/>
		</symbol>

		<symbol id="temperature" x="0" y="0" width="20px" height="20px" style="overflow:visible">
			<path style="fill:#ffffff;fill-opacity:0.4;stroke:none;" d="M -9,9 9,9 0,-9 z"/>
			<path d="M -9,9 9,9 0,-9 z"/>
			<path style="fill:none;stroke:#000000;stroke-width:1px;stroke-linejoin:round;" d="M-1.5,3.4 L-1.5,-2.5 A1.5,1.5 0 1,1 1.5,-2.5 L1.5,3.4 A2.5,2.5 0 1,1 -1.5,3.4"/>
			<path style="fill:none;stroke:#000000;stroke-width:1px;stroke-linejoin:round;" d="M2,-1 L3,-1  M2,1 L3,1 M2,3 L3,3"/>
			<path style="fill:none;stroke:#000000;stroke-width:1px;stroke-linejoin:round;stroke-linecap:round;" d="M0,-1 L0,4.6"/>
			<circle style="fill:#000000;stroke:none;" cx="0" cy="5.5" r="1.5"/>
		</symbol>

		<symbol id="optiqua" x="0" y="0" width="20px" height="20px" style="overflow:visible">
			<path style="fill:#ffffff;fill-opacity:0.4;stroke:none;" d="M -9,9 9,9 0,-9 z"/>
			<path d="M -9,9 9,9 0,-9 z"/>
			<circle style="fill:none;stroke:#000000;stroke-width:1px;" cx="0" cy="3" r="4.5"/> 
			<circle style="fill:#000000;stroke:none;" cx="0" cy="3" r="3.2"/> 
			<circle style="fill:#000000;stroke:#ffffff;stroke-width:1px;" cx="-2" cy="5" r="1.5"/> 
		</symbol>

		<symbol id="leakagedetection" x="0" y="0" width="20px" height="20px" style="overflow:visible">
			<path style="fill:#ffffff;fill-opacity:0.4;stroke:none;" d="M -9,9 9,9 0,-9 z"/>
			<path d="M -9,9 9,9 0,-9 z"/>
			<path style="fill:none;stroke:#000000;stroke-width:1px" d="M-3,1 L1,1"/>
			<path style="fill:none;stroke:#000000;stroke-width:1px" d="M4,3 L4,7"/>
			<path style="fill:none;stroke:#000000;stroke-width:3px" d="M-1,0 L-1,3 A2,2 0 0,0 1,5 L5,5"/>
			<path style="fill:#000000;stroke:none;" d="M-3,5 C-7,10 1,10 -3,5"/>
			<path style="fill:#000000;stroke:none;" d="M-4,4 C-6,6 -2,6 -4,4"/>
		</symbol>
