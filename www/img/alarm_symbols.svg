	<g>
		<use x="100" y="100" width="100px" height="100px" xlink:href="#pressure"/>
		<use x="200" y="100" width="100px" height="100px" xlink:href="#temperature"/>
		<use x="300" y="100" width="100px" height="100px" xlink:href="#optiqua"/>
		<use x="400" y="100" width="100px" height="100px" xlink:href="#leak-detection"/>
	</g>
